/* General page styling */
body {
  font-family: Arial, sans-serif;
  background: #f9f9f9;
  margin: 0;
  padding: 20px;
  color: #333;
  animation: fadeIn 1.5s ease-in;
}

/* Fade-in animation */
@keyframes fadeIn {
  from { opacity: 0; }
  to { opacity: 1; }
}

/* Navigation link */
a {
  text-decoration: none;
  color: #007BFF;
  font-weight: bold;
  transition: color 0.3s ease;
}
a:hover {
  color: #0056b3;
}

/* Headings with slide-in effect */
h2 {
  color: #444;
  border-bottom: 2px solid #007BFF;
  padding-bottom: 5px;
  margin-top: 20px;
  animation: slideIn 1s ease-out;
}

@keyframes slideIn {
  from { transform: translateX(-50px); opacity: 0; }
  to { transform: translateX(0); opacity: 1; }
}

/* Contact info list */
ul {
  list-style: none;
  padding: 0;
}
ul li {
  margin: 10px 0;
  font-size: 16px;
  animation: fadeInUp 1s ease forwards;
}

@keyframes fadeInUp {
  from { transform: translateY(20px); opacity: 0; }
  to { transform: translateY(0); opacity: 1; }
}

/* Form styling */
form {
  background: #fff;
  padding: 20px;
  border-radius: 8px;
  box-shadow: 0 2px 6px rgba(0,0,0,0.1);
  max-width: 500px;
  animation: zoomIn 1s ease;
}

@keyframes zoomIn {
  from { transform: scale(0.9); opacity: 0; }
  to { transform: scale(1); opacity: 1; }
}

label {
  font-weight: bold;
  display: block;
  margin-bottom: 5px;
}

/* Inputs with focus animation */
input[type="text"],
input[type="email"],
textarea {
  width: 100%;
  padding: 12px;
  margin-bottom: 15px;
  border: 1px solid #ccc;
  border-radius: 6px;
  font-size: 15px;
  transition: border-color 0.3s, box-shadow 0.3s;
}

input[type="text"]:focus,
input[type="email"]:focus,
textarea:focus {
  border-color: #007BFF;
  box-shadow: 0 0 8px rgba(0,123,255,0.4);
  outline: none;
}

/* Buttons with hover animation */
input[type="submit"],
input[type="reset"] {
  background: #007BFF;
  color: #fff;
  border: none;
  padding: 12px 20px;
  border-radius: 6px;
  cursor: pointer;
  font-size: 15px;
  margin-right: 10px;
  transition: transform 0.2s ease, background 0.3s ease;
}

input[type="reset"] {
  background: #6c757d;
}

input[type="submit"]:hover,
input[type="reset"]:hover {
  transform: scale(1.05);
}

input[type="submit"]:hover {
  background: #0056b3;
}
input[type="reset"]:hover {
  background: #5a6268;
}
